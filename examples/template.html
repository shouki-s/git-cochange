<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>git-cochange — __TITLE__</title>
<style>
  html, body { margin: 0; height: 100%; background: #0f1115; color: #e6e6e6;
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #header { position: fixed; top: 0; left: 0; right: 0; padding: 10px 14px;
            background: rgba(15, 17, 21, 0.85); border-bottom: 1px solid #222;
            display: flex; gap: 12px; align-items: center; z-index: 10; }
  #header h1 { margin: 0; font-size: 14px; font-weight: 600; }
  #header .meta { font-size: 12px; color: #888; }
  #header input { flex: 1; max-width: 260px; padding: 4px 8px; background: #1a1d24;
                  color: #e6e6e6; border: 1px solid #333; border-radius: 4px; font-size: 12px; }
  #graph { width: 100vw; height: 100vh; display: block; }
  #tooltip { position: fixed; pointer-events: none; padding: 4px 8px;
             background: #1a1d24; border: 1px solid #333; border-radius: 4px;
             font-size: 12px; opacity: 0; transition: opacity 0.1s; z-index: 20; }
  .node { cursor: pointer; }
  .node text { font-size: 10px; fill: #ccc; pointer-events: none; }
  .link { stroke-opacity: 0.5; }
  .dim { opacity: 0.08; }
</style>
</head>
<body>
<div id="header">
  <h1>git-cochange</h1>
  <span class="meta">__TITLE__</span>
  <input id="search" type="text" placeholder="filter files…" />
  <span class="meta" id="counts"></span>
</div>
<svg id="graph" role="img" aria-label="git-cochange graph"></svg>
<div id="tooltip"></div>
<script id="graph-data" type="application/json">"__GRAPH_DATA__"</script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
const data = JSON.parse(document.getElementById('graph-data').textContent);
document.getElementById('counts').textContent =
  `${data.nodes.length} files · ${data.links.length} edges`;

const svg = d3.select('#graph');
const tooltip = d3.select('#tooltip');
const width = window.innerWidth;
const height = window.innerHeight;

const groups = Array.from(new Set(data.nodes.map(n => n.group)));
const color = d3.scaleOrdinal(groups, d3.schemeTableau10);

const root = svg.append('g');

// Distance is shorter when score is higher, clamped to a sensible range.
const linkDistance = d => 30 + 120 * (1 - Math.min(1, d.score));

const simulation = d3.forceSimulation(data.nodes)
  .force('link', d3.forceLink(data.links).id(d => d.id)
    .distance(linkDistance)
    .strength(d => Math.max(0.05, Math.min(1, d.score))))
  .force('charge', d3.forceManyBody().strength(-80))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collide', d3.forceCollide().radius(d => 4 + Math.sqrt(d.degree) * 2));

const link = root.append('g')
  .attr('stroke', '#888')
  .selectAll('line')
  .data(data.links)
  .join('line')
  .attr('class', 'link')
  .attr('stroke-width', d => 0.4 + d.score * 2.5);

const node = root.append('g')
  .selectAll('g')
  .data(data.nodes)
  .join('g')
  .attr('class', 'node')
  .call(d3.drag()
    .on('start', (event, d) => {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x; d.fy = d.y;
    })
    .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
    .on('end', (event, d) => {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null; d.fy = null;
    }));

node.append('circle')
  .attr('r', d => 3 + Math.sqrt(d.degree) * 1.4)
  .attr('fill', d => color(d.group))
  .attr('stroke', '#0f1115')
  .attr('stroke-width', 1);

node.append('text')
  .attr('x', 6)
  .attr('y', 3)
  .text(d => d.id.split('/').pop());

node.on('mouseover', (_event, d) => {
    tooltip.style('opacity', 1).text(d.id);
    highlightNeighbors(d);
  })
  .on('mousemove', (event) => {
    tooltip.style('left', `${event.clientX + 10}px`)
           .style('top', `${event.clientY + 10}px`);
  })
  .on('mouseout', () => {
    tooltip.style('opacity', 0);
    clearHighlight();
  });

simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

svg.call(d3.zoom().scaleExtent([0.1, 8]).on('zoom', (event) => {
  root.attr('transform', event.transform);
}));

const adjacency = new Map();
for (const l of data.links) {
  const s = typeof l.source === 'object' ? l.source.id : l.source;
  const t = typeof l.target === 'object' ? l.target.id : l.target;
  if (!adjacency.has(s)) adjacency.set(s, new Set());
  if (!adjacency.has(t)) adjacency.set(t, new Set());
  adjacency.get(s).add(t);
  adjacency.get(t).add(s);
}

function highlightNeighbors(d) {
  const neighbors = adjacency.get(d.id) ?? new Set();
  node.classed('dim', n => n.id !== d.id && !neighbors.has(n.id));
  link.classed('dim', l => l.source.id !== d.id && l.target.id !== d.id);
}

function clearHighlight() {
  node.classed('dim', false);
  link.classed('dim', false);
}

document.getElementById('search').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  if (!q) { clearHighlight(); return; }
  node.classed('dim', n => !n.id.toLowerCase().includes(q));
  link.classed('dim', l =>
    !l.source.id.toLowerCase().includes(q) && !l.target.id.toLowerCase().includes(q));
});
</script>
</body>
</html>
